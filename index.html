<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sharetask 静态站点</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        line-height: 1.6;
        color: #111;
        background: #fafafa;
      }
      .wrap {
        max-width: 900px;
        margin: 0 auto;
        padding: 56px 20px;
      }
      .card {
        background: #fff;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 14px;
        padding: 22px 22px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
      }
      h1 {
        margin: 0 0 12px 0;
        font-size: 28px;
      }
      p {
        margin: 0 0 14px 0;
        color: #333;
      }
      a {
        color: #0b5fff;
        text-decoration: none;
      }
      code {
        background: #f3f3f3;
        padding: 2px 6px;
        border-radius: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }
      .hint {
        color: #666;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="card">
        <h1>sharetask 静态网站（GitHub Pages）</h1>
        <p>这是一个用于启动部署的占位页面。你把真正的 `sharetask` 静态站点文件放进仓库后，GitHub Actions 会自动重新部署。</p>
        <p class="hint">
          接下来：在 GitHub 新建一个仓库（例如 <code>sharetask-website</code>），然后把本地推送上去即可。
        </p>
      </div>
    </main>
  </body>
</html>
